services:
  postgres:
    image: postgres:18
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:v1.17.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-lc",
          "exec 3<>/dev/tcp/127.0.0.1/6333 && printf 'GET /readyz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && timeout 5 grep -q '200 OK' <&3",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    command: server -filer -dir=/data -master.port=9333 -filer.port=8888 -volume.port=9340
    ports:
      - "8888:8888"
      - "9333:9333"
    volumes:
      - seaweedfs-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:9333/cluster/healthz || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  redis:
    image: redis:8.6.1
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  tempo:
    image: grafana/tempo:2.10.3
    command:
      - -config.file=/etc/tempo/tempo.yml
    ports:
      - "3200:3200"
    volumes:
      - ./monitoring/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    healthcheck:
      test: ["CMD", "/tempo", "-version"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  prometheus:
    image: prom/prometheus:v3.10.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  grafana:
    image: grafana/grafana:12.4.1
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/proxymind-overview.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3000/api/health | grep -q ok || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  api:
    build:
      context: ./backend
      target: runtime
      args:
        GIT_COMMIT_SHA: ${GIT_COMMIT_SHA:-}
    entrypoint:
      - /app/entrypoint.sh
    env_file:
      - .env
      - ./backend/.env
    environment:
      PERSONA_DIR: /app/persona
      CONFIG_DIR: /app/config
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-proxymind-api}
      OTEL_ENVIRONMENT: ${OTEL_ENVIRONMENT:-docker-compose}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
    ports:
      - "8000:8000"
    volumes:
      - ./persona:/app/persona:ro
      - ./config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8000/ready'')"',
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  worker:
    build:
      context: ./backend
      target: runtime
      args:
        GIT_COMMIT_SHA: ${GIT_COMMIT_SHA:-}
    command:
      - python
      - -m
      - app.workers.run
    env_file:
      - .env
      - ./backend/.env
    environment:
      SKIP_MIGRATIONS: "1"
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-proxymind-worker}
      OTEL_ENVIRONMENT: ${OTEL_ENVIRONMENT:-docker-compose}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
      redis:
        condition: service_healthy

  backend-test:
    build:
      context: ./backend
      target: test-runtime
    entrypoint:
      - sleep
      - infinity
    working_dir: /workspace/backend
    env_file:
      - .env
      - ./backend/.env
    environment:
      PERSONA_DIR: /workspace/persona
      CONFIG_DIR: /workspace/config
      PYTEST_USE_EXISTING_POSTGRES: "1"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: test_proxymind
      PYTEST_USE_EXISTING_QDRANT: "1"
      QDRANT_URL: http://qdrant:6333
    volumes:
      - ./:/workspace
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  grafana-data:
  postgres-data:
  prometheus-data:
  qdrant-data:
  seaweedfs-data:
  tempo-data:
  redis-data:
