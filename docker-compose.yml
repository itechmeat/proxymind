services:
  postgres:
    image: postgres:18
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:v1.17.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-lc",
          "exec 3<>/dev/tcp/127.0.0.1/6333 && printf 'GET /readyz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && timeout 5 grep -q '200 OK' <&3",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    command: server -filer -dir=/data -master.port=9333 -filer.port=8888 -volume.port=9340
    ports:
      - "8888:8888"
      - "9333:9333"
    volumes:
      - seaweedfs-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:9333/cluster/healthz || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  redis:
    image: redis:8.6.1
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./backend
      args:
        GIT_COMMIT_SHA: ${GIT_COMMIT_SHA:-}
    entrypoint:
      - /app/entrypoint.sh
    env_file:
      - .env
      - ./backend/.env
    environment:
      PERSONA_DIR: /app/persona
      CONFIG_DIR: /app/config
    ports:
      - "8000:8000"
    volumes:
      - ./persona:/app/persona:ro
      - ./config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8000/ready'')"',
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  worker:
    build:
      context: ./backend
      args:
        GIT_COMMIT_SHA: ${GIT_COMMIT_SHA:-}
    command:
      - python
      - -m
      - app.workers.run
    env_file:
      - .env
      - ./backend/.env
    environment:
      SKIP_MIGRATIONS: "1"
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  qdrant-data:
  seaweedfs-data:
  redis-data:
